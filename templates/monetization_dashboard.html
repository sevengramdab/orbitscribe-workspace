<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monetization Swarm Command Center</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 24px;
        }
        h1 { font-size: 28px; margin-bottom: 8px; background: linear-gradient(135deg, #10b981, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #64748b; margin-bottom: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
        }
        .card h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 12px; }
        .metric { font-size: 32px; font-weight: 700; }
        .metric.positive { color: #34d399; }
        .metric.negative { color: #f87171; }
        .btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        .btn.stop { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .btn.secondary { background: #334155; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .agent-list { display: grid; gap: 8px; }
        .agent-row {
            display: flex; justify-content: space-between; align-items: center;
            background: #0f172a; padding: 10px 14px; border-radius: 8px;
        }
        .agent-name { font-weight: 600; }
        .agent-status { font-size: 12px; color: #64748b; }
        .log {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .controls { margin-bottom: 16px; }
        select, input {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 8px 12px;
            border-radius: 6px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <h1>Monetization Swarm</h1>
    <p class="subtitle">10-agent autonomous business suite</p>

    <div class="grid">
        <div class="card">
            <h3>Net Profit</h3>
            <div class="metric positive" id="netProfit">$0.00</div>
        </div>
        <div class="card">
            <h3>Total Revenue</h3>
            <div class="metric positive" id="totalRevenue">$0.00</div>
        </div>
        <div class="card">
            <h3>Active Agents</h3>
            <div class="metric" id="agentCount">0</div>
        </div>
        <div class="card">
            <h3>Vault Collections</h3>
            <div class="metric" id="vaultCount">0</div>
        </div>
    </div>

    <div class="card controls">
        <h3>Control Panel</h3>
        <select id="autonomySelect">
            <option value="AUTOPILOT">AUTOPILOT (Full Auto)</option>
            <option value="OVERRIDE">OVERRIDE (Pause on Risk)</option>
            <option value="DEFAULT">DEFAULT (Manual Approval)</option>
        </select>
        <input type="number" id="intervalInput" value="300" placeholder="Interval (sec)">
        <button class="btn" onclick="startSwarm()">START SWARM</button>
        <button class="btn stop" onclick="stopSwarm()">STOP ALL</button>
        <button class="btn secondary" onclick="oneShot()">ONE-SHOT CYCLE</button>
        <button class="btn secondary" onclick="refreshStatus()">REFRESH</button>
    </div>

    <div class="card">
        <h3>Agents</h3>
        <div class="agent-list" id="agentList">Loading...</div>
    </div>

    <div class="card">
        <h3>Event Log</h3>
        <div class="log" id="log">Ready. Click START SWARM to begin.</div>
    </div>

    <script>
        const logEl = document.getElementById('log');
        function log(msg) {
            logEl.textContent += msg + '\n';
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function api(method, path, body) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch('http://127.0.0.1:58081' + path, opts);
            return res.json();
        }

        async function refreshStatus() {
            const data = await api('GET', '/api/monetization/status');
            document.getElementById('netProfit').textContent = '$' + (data.net_profit || 0).toFixed(2);
            document.getElementById('totalRevenue').textContent = '$' + (data.total_revenue || 0).toFixed(2);
            document.getElementById('agentCount').textContent = Object.keys(data.agents || {}).length;
            document.getElementById('vaultCount').textContent = Object.keys(data.vault_summary || {}).length;

            const list = document.getElementById('agentList');
            list.innerHTML = '';
            for (const [name, agent] of Object.entries(data.agents || {})) {
                const row = document.createElement('div');
                row.className = 'agent-row';
                const ledger = agent.ledger || {};
                row.innerHTML = `
                    <div>
                        <div class="agent-name">${name}</div>
                        <div class="agent-status">${agent.running ? 'RUNNING' : 'IDLE'} | Decisions: ${ledger.decisions_made || 0}</div>
                    </div>
                    <div style="text-align:right">
                        <div style="color:#34d399;font-weight:700">$${(ledger.lifetime_revenue || 0).toFixed(2)}</div>
                        <button class="btn secondary" style="padding:4px 10px;font-size:11px" onclick="cycleAgent('${name}')">CYCLE</button>
                    </div>
                `;
                list.appendChild(row);
            }
        }

        async function startSwarm() {
            const autonomy = document.getElementById('autonomySelect').value;
            const interval = parseInt(document.getElementById('intervalInput').value) || 300;
            log('Starting swarm in ' + autonomy + ' mode...');

            const resp = await fetch('http://127.0.0.1:58081/api/monetization/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ autonomy_tier: autonomy, interval_seconds: interval })
            });
            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const text = decoder.decode(value);
                for (const line of text.split('\n')) {
                    if (line.startsWith('data: ')) {
                        try {
                            const evt = JSON.parse(line.slice(6));
                            if (evt.event === 'status') log('[STATUS] ' + evt.message);
                            if (evt.event === 'swarm_status') {
                                const d = evt.data;
                                log(`[P&L] Revenue: $${d.total_revenue?.toFixed(2)} | Profit: $${d.net_profit?.toFixed(2)}`);
                            }
                            if (evt.event === 'complete') { log('[COMPLETE] Swarm running.'); refreshStatus(); }
                        } catch (e) {}
                    }
                }
            }
        }

        async function stopSwarm() {
            log('Stopping swarm...');
            await api('POST', '/api/monetization/stop');
            log('Stopped.');
            refreshStatus();
        }

        async function oneShot() {
            const autonomy = document.getElementById('autonomySelect').value;
            log('Running one-shot cycle...');
            const resp = await fetch('http://127.0.0.1:58081/api/monetization/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ autonomy_tier: autonomy, one_shot: true })
            });
            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const text = decoder.decode(value);
                for (const line of text.split('\n')) {
                    if (line.startsWith('data: ')) {
                        try {
                            const evt = JSON.parse(line.slice(6));
                            if (evt.event === 'status') log('[STATUS] ' + evt.message);
                            if (evt.event === 'agent_cycle_complete') log(`  -> ${evt.agent}: ${evt.result}`);
                            if (evt.event === 'complete') { log('[DONE]'); refreshStatus(); }
                        } catch (e) {}
                    }
                }
            }
        }

        async function cycleAgent(name) {
            log('Cycling ' + name + '...');
            await api('POST', `/api/monetization/agent/${name}/cycle`);
            log(name + ' cycled.');
            refreshStatus();
        }

        refreshStatus();
        setInterval(refreshStatus, 10000);
    </script>
</body>
</html>
